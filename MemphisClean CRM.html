<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC0WVIUgIjDUVAuayTvKBBefikh9UMjl-U",
    authDomain: "memphisclean-crm.firebaseapp.com",
    projectId: "memphisclean-crm",
    storageBucket: "memphisclean-crm.firebasestorage.app",
    messagingSenderId: "231258025299",
    appId: "1:231258025299:web:ae265eda467969e23305a6"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>
<script src="crm-data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: #F8F9FC; color: #1A1D2E; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
  input:focus, select:focus, textarea:focus { border-color: #2B3990 !important; box-shadow: 0 0 0 3px rgba(43,57,144,0.12); }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="crm-ui.jsx"></script>
<script type="text/babel" src="crm-auth.jsx"></script>
<script type="text/babel" src="crm-views.jsx"></script>
<script type="text/babel" src="crm-detail.jsx"></script>
<script type="text/babel" src="crm-import.jsx"></script>
<script type="text/babel" src="crm-calendar.jsx"></script>
<script type="text/babel" src="crm-manager.jsx"></script>
<script type="text/babel" src="crm-email.jsx"></script>
<script type="text/babel" src="crm-voice.jsx"></script>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const AUTH_KEY = 'memphisclean_crm_auth';
const OLD_STORAGE_KEY = 'memphisclean_crm_v1'; // for one-time migration only

function loadSession() {
  try {
    const saved = localStorage.getItem(AUTH_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return null;
}

function App() {
  const [currentUser, setCurrentUser] = useState(loadSession);
  const [view, setView] = useState('queue');
  const [contacts, setContactsState] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeContact, setActiveContact] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const migrated = useRef(false);

  // Real-time Firestore listener — keeps both devices in sync automatically
  useEffect(() => {
    const unsub = db.collection('contacts').onSnapshot((snap) => {
      const loaded = snap.docs.map(doc => ({ ...doc.data(), id: doc.id }));
      setContactsState(loaded);
      setLoading(false);
    }, (err) => {
      console.error('Firestore error:', err);
      setLoading(false);
    });
    return () => unsub();
  }, []);

  // One-time migration: if contacts exist in localStorage, push them to Firestore
  useEffect(() => {
    if (migrated.current) return;
    migrated.current = true;
    try {
      const saved = localStorage.getItem(OLD_STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        const valid = (parsed || []).filter(c => c.id && !/^c\d$/.test(c.id));
        if (valid.length > 0) {
          const batch = db.batch();
          valid.forEach(c => batch.set(db.collection('contacts').doc(c.id), c));
          batch.commit().then(() => localStorage.removeItem(OLD_STORAGE_KEY));
        } else {
          localStorage.removeItem(OLD_STORAGE_KEY);
        }
      }
    } catch (e) {}
  }, []);

  const handleLogin = (user) => {
    setCurrentUser(user);
    try { localStorage.setItem(AUTH_KEY, JSON.stringify(user)); } catch (e) {}
    setView(user.role === 'admin' ? 'dashboard' : 'queue');
  };

  const handleLogout = () => {
    setCurrentUser(null);
    try { localStorage.removeItem(AUTH_KEY); } catch (e) {}
    setActiveContact(null);
  };

  // Firestore-aware setContacts — used by Pipeline/CallQueue for stage moves etc.
  const setContacts = (updaterOrArray) => {
    const newContacts = typeof updaterOrArray === 'function'
      ? updaterOrArray(contacts)
      : updaterOrArray;
    const batch = db.batch();
    newContacts.forEach(newC => {
      const old = contacts.find(c => c.id === newC.id);
      if (!old || JSON.stringify(old) !== JSON.stringify(newC)) {
        batch.set(db.collection('contacts').doc(newC.id), newC);
      }
    });
    batch.commit().catch(console.error);
    // Local state updates via onSnapshot automatically
  };

  // Scope contacts to current rep if role is rep
  const scopedContacts = currentUser && currentUser.role === 'rep'
    ? contacts.filter(c => c.assignedTo === currentUser.id)
    : contacts;

  const openContact = (c) => {
    const fresh = contacts.find(x => x.id === c.id) || c;
    setActiveContact(fresh);
  };

  const updateContact = (updated) => {
    db.collection('contacts').doc(updated.id).set(updated).catch(console.error);
    setActiveContact(updated);
  };

  const addContact = (newContact) => {
    const withAssign = { ...newContact, assignedTo: currentUser?.role === 'rep' ? currentUser.id : newContact.assignedTo || 'u1' };
    db.collection('contacts').doc(withAssign.id).set(withAssign).catch(console.error);
    setShowAddModal(false);
  };

  const importContacts = (newContacts) => {
    const batch = db.batch();
    newContacts.forEach(c => batch.set(db.collection('contacts').doc(c.id), c));
    batch.commit().catch(console.error);
  };

  const deleteContact = (contact) => {
    db.collection('contacts').doc(contact.id).delete().catch(console.error);
    if (activeContact && activeContact.id === contact.id) setActiveContact(null);
  };

  // Show login screen if not authenticated
  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  // Loading spinner while Firestore fetches data
  if (loading) {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', background:'#F8F9FC' }}>
        <div style={{ textAlign:'center' }}>
          <div style={{ width:40, height:40, border:'3px solid #2B3990', borderTopColor:'transparent', borderRadius:'50%', animation:'spin 0.8s linear infinite', margin:'0 auto 14px' }}></div>
          <div style={{ color:'#6B7280', fontSize:14, fontWeight:500 }}>Loading CRM…</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar view={view} setView={setView} contacts={scopedContacts} currentUser={currentUser} onLogout={handleLogout} />

      <main style={{ flex: 1, overflowY: 'auto', background: '#F8F9FC' }}>
        {view === 'dashboard' &&
          <Dashboard contacts={scopedContacts} onOpenContact={openContact} />
        }
        {view === 'queue' &&
          <CallQueue contacts={scopedContacts} setContacts={setContacts} onOpenContact={openContact} currentUser={currentUser} />
        }
        {view === 'pipeline' &&
          <Pipeline contacts={scopedContacts} setContacts={setContacts} onOpenContact={openContact} />
        }
        {view === 'contacts' &&
          <AllContacts contacts={scopedContacts} onOpenContact={openContact} onAddContact={() => setShowAddModal(true)} onDeleteContact={deleteContact} />
        }
        {view === 'import' &&
          <ImportLeads onImport={(newContacts) => { importContacts(newContacts); setTimeout(() => setView('queue'), 1200); }} existingContacts={contacts} />
        }
        {view === 'calendar' &&
          <CalendarView contacts={scopedContacts} onOpenContact={openContact} />
        }
        {view === 'manager' &&
          <ManagerDashboard contacts={contacts} />
        }
        {view === 'settings' &&
          <RepManager />
        }
      </main>

      {activeContact &&
        <ContactDetail
          contact={activeContact}
          onClose={() => setActiveContact(null)}
          onUpdate={updateContact}
          currentUser={currentUser} />
      }

      {showAddModal &&
        <AddContactModal
          onSave={addContact}
          onClose={() => setShowAddModal(false)}
          existingContacts={contacts} />
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
